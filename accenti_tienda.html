<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accenti — Ropa de cama y baño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F2EDE4;
    --surface:#FFFDF9;
    --ink:#2A2722;
    --ink-soft:#6B6356;
    --pine:#3D4F46;
    --pine-soft:#E4EAE5;
    --plum:#8C4A5C;
    --plum-soft:#F1E2E5;
    --gold:#C9A867;
    --line:#DDD4C2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 60px;}

  header.top{
    padding:36px 20px 24px;
    text-align:center;
    border-bottom:1px dashed var(--line);
    margin-bottom:28px;
  }
  .logo{
    font-family:'Libre Franklin',sans-serif;
    font-weight:800;
    font-size:38px;
    letter-spacing:1px;
    color:var(--pine);
    margin:0;
  }
  .tagline{
    margin:6px 0 0;
    color:var(--ink-soft);
    font-size:14.5px;
    letter-spacing:.3px;
  }

  /* nav de categorías */
  .cat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--surface);
    font-size:14px;font-weight:600;color:var(--ink);
    cursor:pointer;
    transition:.15s ease;
  }
  .pill .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-soft);}
  .pill.pine .dot{background:var(--pine);}
  .pill.plum .dot{background:var(--plum);}
  .pill:hover{border-color:var(--ink-soft);}
  .pill.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .pill.active .dot{background:var(--gold);}

  .sub-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:30px;}
  .chip{
    padding:6px 14px;
    border-radius:999px;
    border:1px dashed var(--line);
    background:transparent;
    font-size:13px;font-weight:500;color:var(--ink-soft);
    cursor:pointer;
  }
  .chip.active{background:var(--surface);border-color:var(--ink-soft);color:var(--ink);border-style:solid;}

  /* grid de productos */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:18px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    display:flex;flex-direction:column;
    transition:.15s ease;
  }
  .card:hover{border-color:var(--ink-soft);transform:translateY(-2px);}

  .img-box{
    aspect-ratio:1/1;
    background:var(--pine-soft);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .img-box.plum-bg{background:var(--plum-soft);}
  .img-box img{width:100%;height:100%;object-fit:cover;}
  .img-box svg{width:46px;height:46px;opacity:.45;}
  .placeholder-label{
    position:absolute;bottom:8px;left:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:.5px;
    color:var(--ink-soft);text-transform:uppercase;
  }

  .card-body{padding:14px 14px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .subcat-tag{
    align-self:flex-start;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;
    border:1px dashed var(--line);
    color:var(--ink-soft);
  }
  .nombre{font-weight:700;font-size:15.5px;line-height:1.3;margin:0;}
  .desc{font-size:13px;color:var(--ink-soft);line-height:1.4;margin:0;}
  .precio-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px;}
  .precio{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;}
  .precio.consultar{color:var(--ink-soft);font-size:13px;}
  .badge-sinstock{
    font-size:11px;font-weight:600;color:var(--plum);
    background:var(--plum-soft);padding:2px 8px;border-radius:999px;
  }

  .btn-wsp{
    margin-top:10px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:10px;border-radius:10px;
    border:1.5px dashed var(--pine);
    background:transparent;
    color:var(--pine);font-weight:700;font-size:13.5px;
    text-decoration:none;
    cursor:pointer;
    transition:.15s ease;
  }
  .btn-wsp:hover{background:var(--pine);color:#fff;border-style:solid;}
  .btn-wsp svg{width:16px;height:16px;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty b{color:var(--ink);}

  footer{
    text-align:center;margin-top:50px;padding-top:24px;
    border-top:1px dashed var(--line);
    color:var(--ink-soft);font-size:13px;
  }

  @media(max-width:480px){
    .logo{font-size:30px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  }
</style>
</head>
<body>

<header class="top">
  <p class="logo">Accenti</p>
  <p class="tagline">Ropa de cama y baño</p>
</header>

<div class="wrap">
  <div class="cat-row" id="catRow"></div>
  <div class="sub-row" id="subRow"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>Accenti · Consultas por WhatsApp</footer>

<script>
// ====== CONFIGURÁ ESTO ======
const SUPABASE_URL = "https://usdimcbrvbpydvkmacxf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzZGltY2JydmJweWR2a21hY3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTExNDEsImV4cCI6MjEwMDIyNzE0MX0.ZR0g-xbxk0E1G0FTtP2nUuPunD3pjAmLXKVAU_vUqE4";
const WHATSAPP_NUMERO = "5491169472590";
// =============================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATEGORIAS = {
  "Ropa de cama": { color:"pine", subcategorias:["Sábanas","Frazadas","Fundas nórdicas","Acolchados"] },
  "Baño": { color:"plum", subcategorias:["Juegos de toallas","Alfombritas","Cortinas de baño"] }
};

const ICONOS = {
  "Ropa de cama": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 16h20M2 16v4M22 16v4M4 16v-4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4M7 10V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v3"/></svg>`,
  "Baño": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12h16v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-3Z"/><path d="M4 12V6a2 2 0 0 1 2-2h2M9 4v2"/></svg>`
};

let productos = [];
let filtro = { categoria:"Todo", subcategoria:"Todas" };

function esc(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function formatPrecio(p){
  if(p===null || p===undefined || p==="") return null;
  return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(p);
}

function waLink(producto){
  let msg = `Hola! Te quería consultar por: ${producto.nombre}`;
  if(producto.precio) msg += ` (${formatPrecio(producto.precio)})`;
  return `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`;
}

function renderCatRow(){
  const catRow = document.getElementById('catRow');
  let html = `<div class="pill ${filtro.categoria==='Todo'?'active':''}" onclick="setCategoria('Todo')"><span class="dot"></span>Todo</div>`;
  for(const cat in CATEGORIAS){
    const c = CATEGORIAS[cat];
    html += `<div class="pill ${c.color} ${filtro.categoria===cat?'active':''}" onclick="setCategoria('${esc(cat)}')"><span class="dot"></span>${esc(cat)}</div>`;
  }
  catRow.innerHTML = html;
}

function renderSubRow(){
  const subRow = document.getElementById('subRow');
  if(filtro.categoria==='Todo'){ subRow.innerHTML=''; return; }
  const subs = CATEGORIAS[filtro.categoria].subcategorias;
  let html = `<div class="chip ${filtro.subcategoria==='Todas'?'active':''}" onclick="setSubcategoria('Todas')">Todas</div>`;
  subs.forEach(s=>{
    html += `<div class="chip ${filtro.subcategoria===s?'active':''}" onclick="setSubcategoria('${esc(s)}')">${esc(s)}</div>`;
  });
  subRow.innerHTML = html;
}

function setCategoria(cat){
  filtro.categoria = cat;
  filtro.subcategoria = 'Todas';
  renderCatRow(); renderSubRow(); renderGrid();
}
function setSubcategoria(sub){
  filtro.subcategoria = sub;
  renderSubRow(); renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('grid');
  let lista = productos;
  if(filtro.categoria !== 'Todo') lista = lista.filter(p=>p.categoria===filtro.categoria);
  if(filtro.subcategoria !== 'Todas') lista = lista.filter(p=>p.subcategoria===filtro.subcategoria);

  if(lista.length===0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">Todavía no hay productos acá.<br><b>Volvé pronto</b>, estamos cargando el catálogo.</div>`;
    return;
  }

  grid.innerHTML = lista.map(p=>{
    const precioTxt = formatPrecio(p.precio);
    const colorClass = CATEGORIAS[p.categoria]?.color === 'plum' ? 'plum-bg' : '';
    const imgHtml = p.imagen_url
      ? `<img src="${esc(p.imagen_url)}" alt="${esc(p.nombre)}">`
      : `${ICONOS[p.categoria]||''}<span class="placeholder-label">Sin foto</span>`;
    return `
    <div class="card">
      <div class="img-box ${colorClass}">${imgHtml}</div>
      <div class="card-body">
        <span class="subcat-tag">${esc(p.subcategoria)}</span>
        <p class="nombre">${esc(p.nombre)}</p>
        ${p.descripcion ? `<p class="desc">${esc(p.descripcion)}</p>` : ''}
        <div class="precio-row">
          ${precioTxt ? `<span class="precio">${precioTxt}</span>` : `<span class="precio consultar">Consultar precio</span>`}
          ${!p.disponible ? `<span class="badge-sinstock">Sin stock</span>` : ''}
        </div>
        <a class="btn-wsp" href="${waLink(p)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15L2 22l5.2-1.4A10 10 0 1 0 12 2Zm0 18.2a8.2 8.2 0 0 1-4.2-1.2l-.3-.2-3.1.8.8-3-.2-.3a8.2 8.2 0 1 1 7 3.9Zm4.5-6.1c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.7.8-.8 1-.1.1-.3.2-.5.1-.2-.1-1-.4-2-1.2-.7-.7-1.2-1.5-1.4-1.7-.1-.2 0-.4.1-.5l.4-.4c.1-.1.2-.3.2-.4.1-.2 0-.3 0-.4-.1-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 1.9s.8 2.2.9 2.4c.1.2 1.6 2.4 3.8 3.4.5.2 1 .4 1.3.5.6.2 1.1.1 1.5.1.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.1-1.2-.1-.1-.2-.2-.4-.3Z"/></svg>
          Consultar por WhatsApp
        </a>
      </div>
    </div>`;
  }).join('');
}

async function cargarProductos(){
  const { data, error } = await sb.from('productos').select('*').eq('activo', true).order('categoria').order('subcategoria').order('orden').order('nombre');
  if(error){
    document.getElementById('grid').innerHTML = `<div class="empty" style="grid-column:1/-1;">No pudimos cargar el catálogo. Probá de nuevo en un rato.</div>`;
    console.error(error);
    return;
  }
  productos = data || [];
  renderGrid();
}

renderCatRow();
renderSubRow();
cargarProductos();
</script>
</body>
</html>
