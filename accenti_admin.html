<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accenti — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F2EDE4; --surface:#FFFDF9; --ink:#2A2722; --ink-soft:#6B6356;
    --pine:#3D4F46; --pine-soft:#E4EAE5; --plum:#8C4A5C; --plum-soft:#F1E2E5;
    --gold:#C9A867; --line:#DDD4C2; --danger:#A33B3B;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
  .wrap{max-width:920px;margin:0 auto;padding:30px 20px 60px;}
  h1{font-family:'Libre Franklin',sans-serif;font-weight:800;color:var(--pine);font-size:28px;margin:0;}
  .sub{color:var(--ink-soft);font-size:13.5px;margin:4px 0 0;}

  /* login */
  #loginBox{
    max-width:380px;margin:90px auto;background:var(--surface);
    border:1px solid var(--line);border-radius:16px;padding:32px;
  }
  #loginBox h1{text-align:center;margin-bottom:4px;}
  #loginBox .sub{text-align:center;margin-bottom:24px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.3px;}
  input[type=email],input[type=password],input[type=text],input[type=number],textarea,select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-family:'Inter',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;min-height:60px;}
  button{cursor:pointer;font-family:'Inter',sans-serif;}
  .btn{
    padding:11px 18px;border-radius:9px;border:1.5px solid var(--pine);
    background:var(--pine);color:#fff;font-weight:700;font-size:14px;
  }
  .btn:hover{opacity:.9;}
  .btn-outline{background:transparent;color:var(--pine);}
  .btn-outline:hover{background:var(--pine-soft);}
  .btn-danger{border-color:var(--danger);background:transparent;color:var(--danger);}
  .btn-danger:hover{background:#f5e6e6;}
  .btn-block{width:100%;margin-top:18px;}
  #loginError{color:var(--danger);font-size:13px;margin-top:10px;display:none;}

  /* topbar */
  .topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed var(--line);padding-bottom:18px;margin-bottom:24px;}
  .topbar-actions{display:flex;gap:10px;}

  /* listado */
  .group-title{
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.5px;text-transform:uppercase;
    color:var(--ink-soft);margin:26px 0 10px;display:flex;align-items:center;gap:8px;
  }
  .group-title .dot{width:8px;height:8px;border-radius:50%;background:var(--pine);}
  .group-title.plum .dot{background:var(--plum);}

  .row{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px;
  }
  .row .thumb{width:42px;height:42px;border-radius:8px;background:var(--pine-soft);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .row .thumb img{width:100%;height:100%;object-fit:cover;}
  .row .info{flex:1;min-width:0;}
  .row .nombre{font-weight:700;font-size:14px;}
  .row .meta{font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .row .precio{font-family:'JetBrains Mono',monospace;font-size:13.5px;min-width:90px;text-align:right;}
  .row .precio.empty{color:var(--ink-soft);font-size:11.5px;}
  .tagchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;}
  .tagchip.ok{background:var(--pine-soft);color:var(--pine);}
  .tagchip.off{background:#eee;color:#999;}
  .row-actions{display:flex;gap:6px;}
  .iconbtn{
    border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 9px;font-size:12px;color:var(--ink-soft);
  }
  .iconbtn:hover{background:var(--bg);}

  .empty-state{text-align:center;color:var(--ink-soft);padding:50px 0;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(42,39,34,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:16px;padding:28px;max-width:480px;width:100%;}
  .modal h2{font-family:'Libre Franklin',sans-serif;color:var(--pine);margin:0 0 4px;font-size:20px;}
  .modal .sub{margin-bottom:6px;}
  .field-row{display:flex;gap:10px;}
  .field-row > div{flex:1;}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .check-row input{width:auto;}
  .check-row label{margin:0;text-transform:none;font-weight:500;color:var(--ink);font-size:13.5px;}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .current-img{width:56px;height:56px;border-radius:8px;object-fit:cover;margin-top:8px;border:1px solid var(--line);}

  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;
    opacity:0;pointer-events:none;transition:.25s ease;z-index:99;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<div id="loginBox">
  <h1>Accenti</h1>
  <p class="sub">Panel admin</p>
  <label>Email</label>
  <input type="email" id="loginEmail" autocomplete="username">
  <label>Contraseña</label>
  <input type="password" id="loginPass" autocomplete="current-password">
  <button class="btn btn-block" onclick="login()">Entrar</button>
  <p id="loginError">Email o contraseña incorrectos.</p>
</div>

<div class="wrap" id="panel" style="display:none;">
  <div class="topbar">
    <div>
      <h1>Accenti</h1>
      <p class="sub">Panel admin — productos</p>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="abrirModal()">+ Agregar producto</button>
      <button class="btn btn-outline" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
  <div id="listado"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Nuevo producto</h2>
    <p class="sub">Completá lo que tengas — precio y foto los podés sumar después.</p>

    <label>Nombre</label>
    <input type="text" id="fNombre" placeholder="Sábana lisa 240 hilos">

    <div class="field-row">
      <div>
        <label>Categoría</label>
        <select id="fCategoria" onchange="actualizarSubcategorias()">
          <option value="Ropa de cama">Ropa de cama</option>
          <option value="Baño">Baño</option>
        </select>
      </div>
      <div>
        <label>Subcategoría</label>
        <select id="fSubcategoria"></select>
      </div>
    </div>

    <label>Descripción (opcional)</label>
    <textarea id="fDescripcion" placeholder="Tela, medidas, color..."></textarea>

    <div class="field-row">
      <div>
        <label>Precio (opcional)</label>
        <input type="number" id="fPrecio" placeholder="Vacío = Consultar precio">
      </div>
      <div>
        <label>Foto (opcional)</label>
        <input type="file" id="fImagen" accept="image/*">
      </div>
    </div>
    <img id="fImagenActual" class="current-img" style="display:none;">

    <div class="check-row">
      <input type="checkbox" id="fDisponible" checked>
      <label for="fDisponible">Disponible / en stock</label>
    </div>
    <div class="check-row">
      <input type="checkbox" id="fActivo" checked>
      <label for="fActivo">Visible en la tienda</label>
    </div>

    <div class="modal-actions">
      <button class="btn" style="flex:1" onclick="guardarProducto()">Guardar</button>
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ====== CONFIGURÁ ESTO ======
const SUPABASE_URL = "https://usdimcbrvbpydvkmacxf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzZGltY2JydmJweWR2a21hY3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTExNDEsImV4cCI6MjEwMDIyNzE0MX0.ZR0g-xbxk0E1G0FTtP2nUuPunD3pjAmLXKVAU_vUqE4";
// =============================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATEGORIAS = {
  "Ropa de cama": ["Sábanas","Frazadas","Fundas nórdicas","Acolchados"],
  "Baño": ["Juegos de toallas","Alfombritas","Cortinas de baño"]
};

let productos = [];
let editandoId = null;
let imagenActualUrl = null;

function esc(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ---------- AUTH ----------
async function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  document.getElementById('loginError').style.display = 'none';
  mostrarPanel();
}
async function logout(){
  await sb.auth.signOut();
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginBox').style.display = 'block';
}
async function checkSesion(){
  const { data } = await sb.auth.getSession();
  if(data.session) mostrarPanel();
}
function mostrarPanel(){
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  cargarProductos();
}

// ---------- LISTADO ----------
async function cargarProductos(){
  const { data, error } = await sb.from('productos').select('*').order('categoria').order('subcategoria').order('nombre');
  if(error){ toast('No se pudo cargar el listado'); console.error(error); return; }
  productos = data || [];
  renderListado();
}

function renderListado(){
  const cont = document.getElementById('listado');
  if(productos.length===0){
    cont.innerHTML = `<div class="empty-state">Todavía no cargaste productos.<br>Usá "+ Agregar producto" para sumar el primero.</div>`;
    return;
  }
  let html = '';
  for(const cat in CATEGORIAS){
    const items = productos.filter(p=>p.categoria===cat);
    if(items.length===0) continue;
    const colorClass = cat==='Baño' ? 'plum' : '';
    html += `<div class="group-title ${colorClass}"><span class="dot"></span>${esc(cat)} (${items.length})</div>`;
    items.forEach(p=>{
      const thumb = p.imagen_url ? `<img src="${esc(p.imagen_url)}">` : '';
      const precioTxt = (p.precio!==null && p.precio!=='') ? `$${Number(p.precio).toLocaleString('es-AR')}` : 'Consultar';
      html += `
      <div class="row">
        <div class="thumb">${thumb}</div>
        <div class="info">
          <div class="nombre">${esc(p.nombre)}</div>
          <div class="meta">${esc(p.subcategoria)}</div>
        </div>
        <span class="precio ${!p.precio?'empty':''}">${precioTxt}</span>
        <span class="tagchip ${p.disponible?'ok':'off'}">${p.disponible?'En stock':'Sin stock'}</span>
        <span class="tagchip ${p.activo?'ok':'off'}">${p.activo?'Visible':'Oculto'}</span>
        <div class="row-actions">
          <button class="iconbtn" onclick="abrirModal('${p.id}')">Editar</button>
          <button class="iconbtn" onclick="borrarProducto('${p.id}')">Borrar</button>
        </div>
      </div>`;
    });
  }
  cont.innerHTML = html;
}

// ---------- MODAL / FORM ----------
function actualizarSubcategorias(){
  const cat = document.getElementById('fCategoria').value;
  const sel = document.getElementById('fSubcategoria');
  sel.innerHTML = CATEGORIAS[cat].map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
}

function abrirModal(id){
  editandoId = id || null;
  imagenActualUrl = null;
  document.getElementById('fImagen').value = '';
  actualizarSubcategorias();

  if(id){
    const p = productos.find(x=>x.id===id);
    document.getElementById('modalTitle').textContent = 'Editar producto';
    document.getElementById('fNombre').value = p.nombre;
    document.getElementById('fCategoria').value = p.categoria;
    actualizarSubcategorias();
    document.getElementById('fSubcategoria').value = p.subcategoria;
    document.getElementById('fDescripcion').value = p.descripcion || '';
    document.getElementById('fPrecio').value = p.precio ?? '';
    document.getElementById('fDisponible').checked = p.disponible;
    document.getElementById('fActivo').checked = p.activo;
    imagenActualUrl = p.imagen_url;
    const img = document.getElementById('fImagenActual');
    if(p.imagen_url){ img.src = p.imagen_url; img.style.display='block'; } else { img.style.display='none'; }
  } else {
    document.getElementById('modalTitle').textContent = 'Nuevo producto';
    document.getElementById('fNombre').value = '';
    document.getElementById('fCategoria').value = 'Ropa de cama';
    actualizarSubcategorias();
    document.getElementById('fDescripcion').value = '';
    document.getElementById('fPrecio').value = '';
    document.getElementById('fDisponible').checked = true;
    document.getElementById('fActivo').checked = true;
    document.getElementById('fImagenActual').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}
function cerrarModal(){
  document.getElementById('overlay').classList.remove('show');
}

async function subirImagenSiCorresponde(){
  const input = document.getElementById('fImagen');
  if(!input.files || !input.files[0]) return imagenActualUrl;
  const file = input.files[0];
  const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
  const { error } = await sb.storage.from('productos').upload(path, file);
  if(error){ toast('No se pudo subir la foto'); console.error(error); return imagenActualUrl; }
  const { data } = sb.storage.from('productos').getPublicUrl(path);
  return data.publicUrl;
}

async function guardarProducto(){
  const nombre = document.getElementById('fNombre').value.trim();
  if(!nombre){ toast('Ponele un nombre al producto'); return; }

  const imagen_url = await subirImagenSiCorresponde();
  const precioVal = document.getElementById('fPrecio').value;

  const payload = {
    nombre,
    categoria: document.getElementById('fCategoria').value,
    subcategoria: document.getElementById('fSubcategoria').value,
    descripcion: document.getElementById('fDescripcion').value.trim() || null,
    precio: precioVal === '' ? null : Number(precioVal),
    imagen_url: imagen_url || null,
    disponible: document.getElementById('fDisponible').checked,
    activo: document.getElementById('fActivo').checked
  };

  let error;
  if(editandoId){
    ({ error } = await sb.from('productos').update(payload).eq('id', editandoId));
  } else {
    ({ error } = await sb.from('productos').insert(payload));
  }
  if(error){ toast('No se pudo guardar'); console.error(error); return; }

  toast(editandoId ? 'Producto actualizado' : 'Producto agregado');
  cerrarModal();
  cargarProductos();
}

async function borrarProducto(id){
  if(!confirm('¿Borrar este producto? No se puede deshacer.')) return;
  const { error } = await sb.from('productos').delete().eq('id', id);
  if(error){ toast('No se pudo borrar'); console.error(error); return; }
  toast('Producto borrado');
  cargarProductos();
}

checkSesion();
</script>
</body>
</html>
